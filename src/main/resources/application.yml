server:
  port: 8080

app:
  jwt:
    secret: my_ultra_secure_secret_key_12345_67890

spring:
  cloud:
    gateway:
      routes:
        # Auth service — NO JWT filter applied
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/finpro/auth/**

        # Example: User service — JWT required
        - id: user-service
          uri: http://localhost:8081
          predicates:
            - Path=/finpro/user/**
          filters:
            - JwtAuthenticationFilter

        # Example: Product service — JWT required
        - id: product-service
          uri: http://localhost:8083
          predicates:
            - Path=/finpro/expenses/**
          filters:
            - JwtAuthenticationFilter

logging:
  level:
     root: INFO
     org.springframework.cloud.gateway: TRACE
# Monitor WebFlux (useful for reactive debugging)
     org.springframework.web.reactive: DEBUG
# Monitor your custom filter logic
     com.finpro.gateway.filter: DEBUG
# Monitor internal Spring Security logic
     org.springframework.security: DEBUG
# If you want to see the exact HTTP exchanges
     reactor.netty.http.client: DEBUG
