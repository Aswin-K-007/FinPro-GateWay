server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:

        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/finpro/auth/**

        - id: expense-service
          uri: http://localhost:8082
          predicates:
            - Path=/finpro/expenses/**

        - id: user-service
          uri: http://localhost:8083
          predicates:
            - Path=/finpro/users/**

logging:
  level:
    reactor.netty.http.client: DEBUG
    org.springframework.cloud.gateway: DEBUG
    org.springframework.security: TRACE